<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Последний VPN-конфиг — DIRO C&H</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; color: #111; margin-bottom: 8px; }
    .sub { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
    .hint { color: #888; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    .contact-block {
      border-top: 1px solid #eee;
      padding-top: 20px;
      margin-top: 24px;
    }
    .contact-block p { font-size: 13px; color: #888; margin-bottom: 8px; }
    .tg-btn {
      display: inline-block;
      background: #2AABEE;
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .tg-btn:hover { background: #1a9bde; }

    /* ── Блок конфига ── */
    .config-badge {
      display: inline-block;
      background: #e6f4ea;
      color: #1a7f37;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-align: left;
    }
    .url-box {
      background: #f0f7ff;
      border: 1.5px solid #b3d4ff;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: #003a8c;
      word-break: break-all;
      line-height: 1.6;
      margin-bottom: 10px;
      user-select: all;
      text-align: left;
    }
    .vless-box {
      background: #f8faff;
      border: 1.5px solid #d0e4ff;
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: #444;
      word-break: break-all;
      line-height: 1.5;
      margin-bottom: 8px;
      user-select: all;
      text-align: left;
    }
    .copy-btn {
      display: block;
      width: 100%;
      background: #0070f3;
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #005ad1; }
    .copy-btn-sm {
      display: block;
      width: 100%;
      background: #f0f4f8;
      color: #555;
      border: 1px solid #ddd;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    .copy-btn-sm:hover { background: #e0e8f5; }
    .divider-line { border: none; border-top: 1px solid #eee; margin: 18px 0; }
    .qr-center {
      display: flex;
      justify-content: center;
      margin: 12px 0 16px;
    }
    .qr-center img {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      max-width: 220px;
      width: 220px;
      height: 220px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DIRO C&amp;H</h1>
    <p class="sub">Последний созданный VPN-конфиг</p>

    <div id="config-block">
      <p class="hint">Загружаем...</p>
    </div>

    <div class="contact-block">
      <p>Есть вопросы? Пишите:</p>
      <a class="tg-btn" href="https://t.me/dmkalisteel">&#9992;&#65039; Написать в Telegram</a>
    </div>
  </div>

<script>
(function () {
  var block = document.getElementById('config-block');
  var SUB_BASE = 'https://dirocandh.github.io/server_network/subs/';

  function makeCopyBtn(text, label, cls) {
    var btn = document.createElement('button');
    btn.textContent = label;
    btn.className = cls;
    btn.onclick = function () {
      function fallback() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(fallback);
      } else { fallback(); }
      var prev = btn.textContent;
      btn.textContent = '✅ Скопировано!';
      btn.style.background = '#1a7f37';
      setTimeout(function () {
        btn.textContent = prev;
        btn.style.background = '';
      }, 2500);
    };
    return btn;
  }

  function showNotReady() {
    while (block.firstChild) block.removeChild(block.firstChild);
    var p = document.createElement('p');
    p.className = 'hint';
    p.style.cssText = 'margin: 16px 0; font-size: 15px;';
    p.textContent = 'Конфиг пока не готов — загляните чуть позже.';
    block.appendChild(p);
  }

  function showConfig(token, vlessLink) {
    var subUrl = SUB_BASE + token + '.txt';

    while (block.firstChild) block.removeChild(block.firstChild);

    var badge = document.createElement('div');
    badge.className = 'config-badge';
    badge.textContent = '✅ Конфиг готов';
    block.appendChild(badge);

    /* ── Subscription URL ── */
    var subLabel = document.createElement('p');
    subLabel.className = 'section-label';
    subLabel.textContent = 'Ссылка-подписка';
    block.appendChild(subLabel);

    var hint = document.createElement('p');
    hint.className = 'hint';
    hint.textContent = 'Вставьте эту ссылку как подписку в ваш VPN-клиент (v2rayNG, Hiddify и т.п.)';
    block.appendChild(hint);

    var urlBox = document.createElement('div');
    urlBox.className = 'url-box';
    urlBox.textContent = subUrl;
    block.appendChild(urlBox);

    block.appendChild(makeCopyBtn(subUrl, '📋 Скопировать ссылку', 'copy-btn'));

    /* ── QR ── */
    var hr1 = document.createElement('hr');
    hr1.className = 'divider-line';
    block.appendChild(hr1);

    var qrLabel = document.createElement('p');
    qrLabel.className = 'section-label';
    qrLabel.textContent = 'QR-код';
    block.appendChild(qrLabel);

    var qrWrap = document.createElement('div');
    qrWrap.className = 'qr-center';
    var qrImg = document.createElement('img');
    qrImg.src = 'qr-latest.png?ts=' + Date.now();
    qrImg.alt = 'QR-код';
    qrImg.width = 220;
    qrImg.height = 220;
    qrWrap.appendChild(qrImg);
    block.appendChild(qrWrap);

    /* ── VLESS link ── */
    if (vlessLink) {
      var hr2 = document.createElement('hr');
      hr2.className = 'divider-line';
      block.appendChild(hr2);

      var vlessLabel = document.createElement('p');
      vlessLabel.className = 'section-label';
      vlessLabel.style.cssText = 'font-size:12px;color:#888;';
      vlessLabel.textContent = 'VLESS-ссылка (для ручной настройки)';
      block.appendChild(vlessLabel);

      var vlessBox = document.createElement('div');
      vlessBox.className = 'vless-box';
      vlessBox.textContent = vlessLink;
      block.appendChild(vlessBox);

      block.appendChild(makeCopyBtn(vlessLink, '📋 Скопировать VLESS', 'copy-btn-sm'));
    }
  }

  fetch('latest.txt?ts=' + Date.now(), { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      var t = data && data.token;
      var token = (typeof t === 'string' && /^[A-Za-z0-9_-]{20,64}$/.test(t)) ? t : null;
      if (token) {
        showConfig(token, data.vless_link || '');
      } else {
        showNotReady();
      }
    })
    .catch(function () {
      showNotReady();
    });
})();
</script>
</body>
</html>
