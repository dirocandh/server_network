<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN FOR YOU — 150 ₽/мес</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; color: #111; margin-bottom: 8px; }
    .sub { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
    .price {
      font-size: 42px;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
    }
    .price span { font-size: 18px; color: #888; font-weight: 400; }
    .qr-wrap {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .qr-wrap img { width: 200px; height: 200px; display: block; }
    .sbp-btn {
      display: inline-block;
      background: #0070f3;
      color: #fff;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .sbp-btn:hover { background: #005ad1; }
    .divider {
      color: #bbb;
      font-size: 13px;
      margin: 4px 0 16px;
    }
    .hint { color: #888; font-size: 13px; line-height: 1.6; margin-bottom: 28px; }
    .contact-block {
      border-top: 1px solid #eee;
      padding-top: 20px;
    }
    .contact-block p { font-size: 13px; color: #888; margin-bottom: 8px; }
    .tg-btn {
      display: inline-block;
      background: #2AABEE;
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .tg-btn:hover { background: #1a9bde; }

    /* ── Блок подписки по токену ── */
    .sub-link {
      display: block;
      word-break: break-all;
      color: #0070f3;
      font-size: 13px;
      line-height: 1.5;
      margin: 8px 0 12px;
      text-decoration: none;
    }
    .sub-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DIRO C&H</h1>
    <p class="sub">Облачные серверы.<br>Для тебя, для всех.</p>

    <div class="price">150 ₽ <span>/ месяц</span></div>

    <div class="qr-wrap">
      <img src="qr.jpg" alt="QR-код для оплаты по СБП">
    </div>

    <br>
    <a class="sbp-btn" href="https://t.tb.ru/c2c-qr-choose-bank?requisiteNumber=+79378890409&bankCode=100000000004">
      💳 Оплатить через СБП
    </a>

    <p class="divider">или отсканируйте QR-код выше</p>
    <p class="divider" style="font-size: 22px; font-weight: bold; color: #111;">После оплаты</p>
    <p class="divider">Перейдите по ссылке ниже для получения конфига</p>
    <div id="config-link" class="divider">
      <a href="https://vendorpatchnet.xyz/new-order" target="_blank" rel="noopener noreferrer">
        https://vendorpatchnet.xyz/new-order
      </a>
    </div>

    <div class="contact-block">
      <p>Есть вопросы? Пишите:</p>
      <a class="tg-btn" href="https://t.me/dmkalisteel">✈️ Написать в Telegram</a>
    </div>
  </div>

<script>
(function () {
  var raw   = (location.hash || '').replace(/^#/, '').trim();
  var token = /^[A-Za-z0-9_-]{20,64}$/.test(raw) ? raw : null;
  if (!token) return;

  var base      = 'https://dirocandh.github.io/server_network/subs/';
  var subUrl    = base + token + '.txt';
  var container = document.getElementById('config-link');
  if (!container) return;

  var hint = document.createElement('p');
  hint.className   = 'hint';
  hint.style.marginBottom = '8px';
  hint.textContent = 'Вставьте эту ссылку как подписку в ваш VPN-клиент (v2rayNG, Hiddify и т.п.)';

  var a = document.createElement('a');
  a.href      = subUrl;    /* constructed from validated token — no injection risk */
  a.textContent = subUrl;  /* textContent, not innerHTML */
  a.target    = '_blank';
  a.rel       = 'noopener noreferrer';
  a.className = 'sub-link';

  var btn = document.createElement('button');
  btn.textContent = 'Скопировать ссылку';
  btn.className   = 'sbp-btn';
  btn.style.cssText = 'display:block;width:100%;margin-top:4px;border:none;cursor:pointer;';

  btn.onclick = function () {
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = subUrl;
      ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(subUrl).catch(fallback);
    } else {
      fallback();
    }
    btn.textContent = '✅ Скопировано!';
    btn.style.background = '#1a7f37';
    setTimeout(function () {
      btn.textContent = 'Скопировать ссылку';
      btn.style.background = '';
    }, 2500);
  };

  while (container.firstChild) container.removeChild(container.firstChild);
  container.appendChild(hint);
  container.appendChild(a);
  container.appendChild(btn);
})();
</script>
</body>
</html>
