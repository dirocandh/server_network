<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN FOR YOU — 150 ₽/мес</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; color: #111; margin-bottom: 8px; }
    .sub { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
    .price {
      font-size: 42px;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
    }
    .price span { font-size: 18px; color: #888; font-weight: 400; }
    .qr-wrap {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .qr-wrap img { width: 200px; height: 200px; display: block; }
    .sbp-btn {
      display: inline-block;
      background: #0070f3;
      color: #fff;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .sbp-btn:hover { background: #005ad1; }
    .divider {
      color: #bbb;
      font-size: 13px;
      margin: 4px 0 16px;
    }
    .hint { color: #888; font-size: 13px; line-height: 1.6; margin-bottom: 28px; }
    .contact-block {
      border-top: 1px solid #eee;
      padding-top: 20px;
    }
    .contact-block p { font-size: 13px; color: #888; margin-bottom: 8px; }
    .tg-btn {
      display: inline-block;
      background: #2AABEE;
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .tg-btn:hover { background: #1a9bde; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DIRO C&H</h1>
    <p class="sub">Облачные серверы.<br>Для тебя, для всех.</p>

    <div class="price">150 ₽ <span>/ месяц</span></div>

    <div class="qr-wrap">
      <img src="qr.jpg" alt="QR-код для оплаты по СБП">
    </div>

    <br>
    <a class="sbp-btn" href="https://t.tb.ru/c2c-qr-choose-bank?requisiteNumber=+79378890409&bankCode=100000000004">
      💳 Оплатить через СБП
    </a>

    <p class="divider">или отсканируйте QR-код выше</p>

    <p class="hint">
      После оплаты напишите мне в Telegram —<br>
      выдам конфигурацию в течение часа.
    </p>

    <div class="contact-block">
      <p>Есть вопросы? Пишите:</p>
      <a class="tg-btn" href="https://t.me/ВАШ_НИК">✈️ Написать в Telegram</a>
    </div>
  </div>
</body>
</html>
